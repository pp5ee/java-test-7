spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  data:
    redis:
      host: localhost
      port: 6379

  mail:
    host: localhost
    port: 1025

  sql:
    init:
      mode: never

  cache:
    type: none

jwt:
  secret: TestSecretKeyForJWTTokenGenerationAndValidation2024Test
  expiration: 86400000
  refresh-expiration: 604800000

app:
  frontend-url: http://localhost:3000
  verification-code:
    expiry-minutes: 10
    length: 6
  mail:
    from: test@test.com
    from-name: "Test"

logging:
  level:
    com.enterprise.hr: DEBUG